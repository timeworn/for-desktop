<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>Stoat Desktop</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #1a110f;
        color: #f1dfdb;
      }

      svg {
        display: block;
      }

      a {
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      button,
      input {
        font: inherit;
        color: inherit;
        border: none;
      }

      button {
        cursor: pointer;
      }

      #titlebar {
        height: 29px;
        background: #a08c88;
        padding: 5px;
      }

      #drag-region {
        user-select: none;
        -webkit-app-region: drag;
        width: calc(100% - 100px);
        height: 100%;
        float: left;
      }

      #window-controls {
        width: 100px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-direction: row-reverse;
      }

      #server-picker {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: #271d1b;
        border-radius: 2rem;
        width: 25%;
        height: 33%;
        padding: 30px;
      }

      #greeting {
        font-size: 1.5rem;
      }

      #instructions {
        font-weight: bold;
        margin-top: 5px;
      }

      #form-input {
        background: #3d3230;
        height: 50px;
        width: 100%;
        padding: 10px;
        color: #ffb4ab;
        border-bottom: 1px solid #ffb4ab;
        margin-top: 5px;
      }

      #form-button {
        background: #ffb4a4;
        margin-left: 50%;
        transform: translate(-50%);
        height: 40px;
        width: 200px;
        border-radius: 1rem;
        margin-top: 20px;
        color: #561f12;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div id="titlebar">
      <div id="drag-region"></div>
      <div id="window-controls">
        <a onclick="native.close()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 -960 960 960"
          >
            <path
              d="m249-207-42-42 231-231-231-231 42-42 231 231 231-231 42 42-231 231 231 231-42 42-231-231z"
            ></path>
          </svg>
        </a>
        <a onclick="native.maximise()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 -960 960 960"
          >
            <path
              d="M200-200v-240h60v180h180v60zm500-320v-180H520v-60h240v240z"
            ></path>
          </svg>
        </a>
        <a onclick="native.minimise()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 -960 960 960"
          >
            <path d="M240-120v-60h481v60z"></path>
          </svg>
        </a>
      </div>
    </div>
    <div id="server-picker">
      <div>
        <span id="greeting">Hello!</span>
        <p id="instructions">Connect to a Stoat Server</p>
      </div>
      <form onsubmit="submitHomeserver(event)">
        <div>
          <input
            id="form-input"
            type="text"
            name="server"
            required=""
            placeholder="Server Address"
          />
          <button type="submit" id="form-button">Connect</button>
        </div>
      </form>
    </div>

    <script>
      function submitHomeserver(e) {
        e.preventDefault();
        desktopConfig.setHomeserver(e.target[0].value);
      }

      // bad way to set but it works for now i guess
      (function initServerInput() {
        const config = desktopConfig.get();
        if (config) {
          const serverInput = document.querySelector('input[name="server"]');
          serverInput.value = config.homeserver || "https://beta.revolt.chat";
        } else {
          setTimeout(initServerInput, 50);
        }
      })();
    </script>
  </body>
</html>
